services:
  db:
    image: postgres:16

    environment:
      POSTGRES_DB: selfcord
      POSTGRES_USER: selfcord
      POSTGRES_PASSWORD: selfcord

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7

    ports:
      - "6379:6379"


volumes:
  postgres_data: